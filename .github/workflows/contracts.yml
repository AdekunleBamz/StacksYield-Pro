name: Contracts CI

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'contracts/**'
  pull_request:
    branches: [ "main", "master" ]
    paths:
      - 'contracts/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Clarinet
        uses: hirosystems/setup-clarinet@v1
        with:
          version: '2.4.0'

      - name: Prepare Clarinet settings
        run: cp settings/Simnet.example.toml settings/Devnet.toml

      - name: Check contracts
        run: clarinet check
